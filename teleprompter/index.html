<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta name="theme-color" content="#050507">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Суфлёр Алины</title>
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#060608;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",Arial,sans-serif}button,textarea,input{font:inherit}.hidden{display:none!important}
    .setup{height:100dvh;overflow:auto;padding:max(18px,env(safe-area-inset-top)) 16px max(24px,env(safe-area-inset-bottom));background:radial-gradient(circle at 82% 0,#362365 0,transparent 34%),#09090c}.panel{width:min(680px,100%);margin:auto}.eyebrow{color:#bea8ff;font-size:12px;font-weight:850;letter-spacing:.16em}.panel h1{margin:9px 0 6px;font-size:clamp(30px,8vw,50px);line-height:1.02;letter-spacing:-.045em}.hint{color:#aaaab3;font-size:14px;line-height:1.4;margin:0 0 14px}.textInput{width:100%;height:37dvh;min-height:235px;resize:vertical;border:1px solid #30303a;border-radius:18px;padding:16px;background:#15151b;color:#fff;font-size:17px;line-height:1.5;outline:0}.textInput:focus{border-color:#8b5cf6;box-shadow:0 0 0 3px #8b5cf633}.controls{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:12px 0}.control{border:1px solid #292932;border-radius:14px;padding:10px 12px;background:#111116;color:#b8b8c0;font-size:13px}.control b{float:right;color:#fff}input[type=range]{width:100%;margin-top:9px;accent-color:#8b5cf6}.switch{display:flex;align-items:center;gap:10px;color:#dddde2;font-size:14px;margin:10px 0}.switch input{width:20px;height:20px;accent-color:#8b5cf6}.primary{width:100%;border:0;border-radius:17px;padding:16px;background:linear-gradient(135deg,#9b70ff,#7047df);color:#fff;font-size:17px;font-weight:800;box-shadow:0 12px 35px #7c3aed44}.permission{margin-top:10px;color:#92929c;font-size:12px;text-align:center}
    .camera{position:fixed;inset:0;background:#000;overflow:hidden}video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}.shade{position:absolute;inset:0;background:linear-gradient(#0008 0,#0000 20%,#0000 72%,#0009 100%);pointer-events:none}.guide{position:absolute;left:8px;right:8px;top:15%;height:48%;overflow:hidden;border-radius:18px;background:#00000038;backdrop-filter:blur(2px);-webkit-mask-image:linear-gradient(transparent,#000 12%,#000 86%,transparent);mask-image:linear-gradient(transparent,#000 12%,#000 86%,transparent)}.script{padding:20vh 7vw 24vh;white-space:pre-wrap;text-align:center;font-size:38px;font-weight:780;line-height:1.28;letter-spacing:-.025em;transition:transform .3s ease}.word{color:#fff}.word.done{color:#ffffff55}.word.current{color:#d7c8ff;text-shadow:0 0 18px #7c3aed}.focusLine{position:absolute;z-index:2;top:51%;left:5%;right:5%;height:2px;background:linear-gradient(90deg,transparent,#a982ff,transparent);pointer-events:none}.topbar{position:absolute;z-index:5;top:max(12px,env(safe-area-inset-top));left:12px;right:12px;display:flex;justify-content:space-between;align-items:center}.pill{border:1px solid #ffffff26;border-radius:999px;padding:9px 13px;background:#111116b8;backdrop-filter:blur(14px);color:#fff;font-size:13px;font-weight:750}.status{display:flex;align-items:center;gap:7px}.dot{width:8px;height:8px;border-radius:50%;background:#787882}.listening .dot{background:#58e28a;box-shadow:0 0 12px #58e28a}.recording .dot{background:#ff3b4d;box-shadow:0 0 12px #ff3b4d}.bottom{position:absolute;z-index:6;left:14px;right:14px;bottom:max(16px,env(safe-area-inset-bottom));display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:18px}.sideBtn{justify-self:center;border:0;background:#17171dcc;color:#fff;border-radius:15px;padding:12px 13px;font-size:13px;font-weight:750;backdrop-filter:blur(14px)}.record{width:72px;height:72px;border:5px solid #fff;border-radius:50%;background:#ff3347;box-shadow:0 4px 26px #0009}.record.on{border-radius:24px;transform:scale(.88)}.voiceBar{position:absolute;z-index:5;left:16px;right:16px;bottom:calc(max(16px,env(safe-area-inset-bottom)) + 88px);display:flex;gap:9px;align-items:center;padding:9px 12px;border-radius:14px;background:#111116bc;backdrop-filter:blur(14px);font-size:12px;color:#c8c8ce}.voiceBar input{margin:0}.toast{position:absolute;z-index:10;top:28%;left:50%;transform:translateX(-50%);width:min(88%,390px);padding:14px;border-radius:16px;background:#17171ee8;text-align:center;font-size:14px;line-height:1.4;box-shadow:0 10px 40px #000}.result{position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:14px;padding:24px;background:#08080c}.result h2{margin:0;font-size:30px}.result p{margin:0 0 4px;color:#aaaab2;text-align:center;line-height:1.4}.result a,.result button{width:min(360px,100%);border:0;border-radius:16px;padding:16px;text-align:center;text-decoration:none;font-weight:800}.save{background:#8b5cf6;color:#fff}.again{background:#202027;color:#fff}
  </style>
</head>
<body>
  <main id="app" class="setup"></main>
  <section id="result" class="result hidden"><h2>Видео готово</h2><p>Нажми «Сохранить видео», затем выбери «Сохранить видео» или «Сохранить в Файлы».</p><a id="save" class="save">Сохранить видео</a><button id="again" class="again">Снять ещё раз</button></section>
  <script>
    const starter='Я решила сразу проверить ИИ-менеджера на живом клиенте. Это была ошибка.\\n\\nЗа пять минут он четыре раза поздоровался и несколько раз спросил то, что клиент уже написал.\\n\\nПришлось написать: «Извините, я сейчас борюсь с этим роботом».\\n\\nДо Сочи два дня. Либо я его настрою, либо он настроит меня.';
    const app=document.querySelector('#app'),result=document.querySelector('#result');
    let text=localStorage.getItem('alina-prompter-text')||starter,size=38,sensitivity=55,voiceMode=true,stream,recorder,chunks=[],recognition,currentWord=0,recording=false,listening=false,manualOffset=0;
    const clean=s=>(s||'').toLowerCase().replace(/ё/g,'е').replace(/[^\p{L}\p{N}\s]/gu,' ').replace(/\s+/g,' ').trim();
    const words=()=>text.match(/\S+/g)||[];
    function esc(s){return s.replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')}
    function setup(){
      stopEverything();result.classList.add('hidden');app.className='setup';
      app.innerHTML=`<div class="panel"><div class="eyebrow">СУФЛЁР АЛИНЫ</div><h1>Камера читает вместе с тобой</h1><p class="hint">Текст будет двигаться по словам, которые ты произносишь.</p><textarea class="textInput" aria-label="Текст">${esc(text)}</textarea><div class="controls"><label class="control">Размер <b id="sv">${size}</b><input id="size" type="range" min="26" max="58" value="${size}"></label><label class="control">Чувствительность <b id="cv">${sensitivity}</b><input id="sense" type="range" min="25" max="90" value="${sensitivity}"></label></div><label class="switch"><input id="voice" type="checkbox" ${voiceMode?'checked':''}><span>Двигать текст за моим голосом</span></label><button class="primary" id="open">Открыть камеру</button><div class="permission">При первом запуске разреши доступ к камере и микрофону.</div></div>`;
      const ta=app.querySelector('textarea');ta.oninput=e=>{text=e.target.value;localStorage.setItem('alina-prompter-text',text)};
      app.querySelector('#size').oninput=e=>{size=+e.target.value;app.querySelector('#sv').textContent=size};
      app.querySelector('#sense').oninput=e=>{sensitivity=+e.target.value;app.querySelector('#cv').textContent=sensitivity};
      app.querySelector('#voice').onchange=e=>voiceMode=e.target.checked;app.querySelector('#open').onclick=openCamera;
    }
    async function openCamera(){
      try{
        stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:1080},height:{ideal:1920}},audio:{echoCancellation:true,noiseSuppression:true}});
        cameraUI();
      }catch(e){alert('Не получилось открыть камеру. В настройках Safari разреши камеру и микрофон для этого сайта.')}
    }
    function cameraUI(){
      currentWord=0;manualOffset=0;app.className='camera';
      app.innerHTML=`<video autoplay playsinline muted></video><div class="shade"></div><div class="guide"><div class="script" style="font-size:${size}px"></div><div class="focusLine"></div></div><div class="topbar"><button id="back" class="pill">← Текст</button><div id="status" class="pill status"><i class="dot"></i><span>Готов</span></div></div><div class="voiceBar"><span>Положение</span><input id="position" type="range" min="0" max="100" value="0"></div><div class="bottom"><button id="rewind" class="sideBtn">↶ Назад</button><button id="record" class="record" aria-label="Запись"></button><button id="voiceToggle" class="sideBtn">${voiceMode?'Голос: вкл':'Голос: выкл'}</button></div><div id="toast" class="toast">Нажми красную кнопку. После начала записи говори естественно — текст будет следовать за тобой.</div>`;
      app.querySelector('video').srcObject=stream;renderWords();setTimeout(()=>app.querySelector('#toast')?.remove(),4200);
      app.querySelector('#back').onclick=setup;app.querySelector('#record').onclick=toggleRecord;
      app.querySelector('#rewind').onclick=()=>{currentWord=Math.max(0,currentWord-8);renderWords()};
      app.querySelector('#voiceToggle').onclick=e=>{voiceMode=!voiceMode;e.target.textContent=voiceMode?'Голос: вкл':'Голос: выкл';if(recording){voiceMode?startSpeech():stopSpeech()}};
      app.querySelector('#position').oninput=e=>{manualOffset=+e.target.value;scrollToWord()};
    }
    function renderWords(){
      const list=words(),box=app.querySelector('.script');if(!box)return;
      box.innerHTML=list.map((w,i)=>`<span class="word ${i<currentWord?'done':''} ${i===currentWord?'current':''}" data-i="${i}">${esc(w)} </span>`).join('');
      scrollToWord();
    }
    function scrollToWord(){
      const guide=app.querySelector('.guide'),box=app.querySelector('.script'),active=app.querySelector(`[data-i="${currentWord}"]`);if(!guide||!box||!active)return;
      const target=Math.max(0,active.offsetTop-guide.clientHeight*.43+manualOffset*2.2);box.style.transform=`translateY(${-target}px)`;
    }
    function updateStatus(mode,label){const s=app.querySelector('#status');if(!s)return;s.className='pill status '+mode;s.querySelector('span').textContent=label}
    function bestMatch(transcript){
      const spoken=clean(transcript).split(' ').filter(Boolean),list=words().map(clean),windowStart=Math.max(0,currentWord-4),windowEnd=Math.min(list.length,currentWord+35);let best=currentWord,score=0;
      for(let start=windowStart;start<windowEnd;start++){let hits=0;for(let j=0;j<spoken.length&&start+j<list.length;j++){if(list[start+j]===spoken[j]||list[start+j].startsWith(spoken[j])||spoken[j].startsWith(list[start+j]))hits++}const ratio=hits/Math.max(1,spoken.length);if(ratio>score){score=ratio;best=start+hits}}
      if(score>=Math.max(.28,1-sensitivity/100))currentWord=Math.max(currentWord,best);else if(spoken.length>2)currentWord=Math.min(words().length-1,currentWord+Math.max(1,Math.floor(spoken.length*.45)));
      renderWords();
    }
    function startSpeech(){
      const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){showToast('На этом iPhone слежение за голосом недоступно. Текст можно двигать ползунком.');return}
      stopSpeech();recognition=new SR();recognition.lang='ru-RU';recognition.continuous=true;recognition.interimResults=true;
      recognition.onstart=()=>{listening=true;updateStatus(recording?'recording':'listening',recording?'Запись • слушаю':'Слушаю')};
      recognition.onresult=e=>{let phrase='';for(let i=e.resultIndex;i<e.results.length;i++)phrase+=' '+e.results[i][0].transcript;bestMatch(phrase)};
      recognition.onerror=()=>{};recognition.onend=()=>{listening=false;if(recording&&voiceMode)setTimeout(startSpeech,250)};
      try{recognition.start()}catch(e){}
    }
    function stopSpeech(){if(recognition){recognition.onend=null;try{recognition.stop()}catch(e){}recognition=null}listening=false}
    function supportedMime(){const types=['video/mp4;codecs=h264,aac','video/mp4','video/webm;codecs=vp9,opus','video/webm'];return types.find(t=>window.MediaRecorder&&MediaRecorder.isTypeSupported(t))||''}
    function toggleRecord(){recording?stopRecord():startRecord()}
    function startRecord(){
      if(!window.MediaRecorder){showToast('Эта версия Safari не умеет сохранять запись. Обнови iOS или открой ссылку в Safari.');return}
      chunks=[];const mime=supportedMime();try{recorder=new MediaRecorder(stream,mime?{mimeType:mime}:undefined)}catch(e){recorder=new MediaRecorder(stream)}
      recorder.ondataavailable=e=>{if(e.data.size)chunks.push(e.data)};recorder.onstop=finishVideo;recorder.start(1000);recording=true;
      app.querySelector('#record').classList.add('on');updateStatus('recording','Запись');if(voiceMode)startSpeech();
    }
    function stopRecord(){recording=false;stopSpeech();if(recorder&&recorder.state!=='inactive')recorder.stop();app.querySelector('#record')?.classList.remove('on');updateStatus('','Готов')}
    function finishVideo(){
      const type=recorder?.mimeType||'video/mp4',blob=new Blob(chunks,{type}),url=URL.createObjectURL(blob),ext=type.includes('mp4')?'mp4':'webm';
      document.querySelector('#save').href=url;document.querySelector('#save').download=`video-aliny-${new Date().toISOString().slice(0,10)}.${ext}`;result.classList.remove('hidden');
    }
    function showToast(message){let t=app.querySelector('#toast');if(!t){t=document.createElement('div');t.id='toast';t.className='toast';app.appendChild(t)}t.textContent=message;setTimeout(()=>t.remove(),5000)}
    function stopEverything(){recording=false;stopSpeech();if(recorder&&recorder.state!=='inactive')try{recorder.stop()}catch(e){}if(stream){stream.getTracks().forEach(t=>t.stop());stream=null}}
    document.querySelector('#again').onclick=()=>{result.classList.add('hidden');setup()};window.addEventListener('beforeunload',stopEverything);setup();
  </script>
</body>
</html>
