<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#08080b">
  <title>Суфлёр Алины</title>
  <style>
    *{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#08080b;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",Arial,sans-serif}button,textarea,input{font:inherit}.setup{min-height:100dvh;padding:max(20px,env(safe-area-inset-top)) 16px max(24px,env(safe-area-inset-bottom));background:radial-gradient(circle at 80% 0,#33215f 0,transparent 32%),#09090c}.panel{width:min(680px,100%);margin:auto}.eyebrow{color:#bba3ff;font-size:12px;font-weight:800;letter-spacing:.16em}.panel h1{margin:10px 0 6px;font-size:clamp(30px,8vw,52px);line-height:1.02;letter-spacing:-.04em}.hint{color:#aaaab2;font-size:15px;margin:0 0 16px}textarea{width:100%;height:39dvh;min-height:260px;resize:vertical;border:1px solid #30303a;border-radius:18px;padding:17px;background:#15151b;color:#fff;font-size:18px;line-height:1.5;outline:none}textarea:focus{border-color:#8b5cf6;box-shadow:0 0 0 3px #8b5cf633}.controls{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:15px 0 12px}.controls label{border:1px solid #292932;border-radius:14px;padding:11px 13px;background:#111116;color:#b8b8c0;font-size:13px}.controls b{float:right;color:#fff}input[type=range]{width:100%;margin-top:9px;accent-color:#8b5cf6}.switch{display:flex;align-items:center;gap:10px;color:#d4d4da;font-size:15px;margin:8px 0 14px}.switch input{width:20px;height:20px;accent-color:#8b5cf6}.primary{width:100%;border:0;border-radius:17px;padding:17px;background:linear-gradient(135deg,#9b70ff,#7047df);color:#fff;font-size:18px;font-weight:750;box-shadow:0 12px 35px #7c3aed44}.reader{position:fixed;inset:0;overflow:hidden;background:#000}.scroll{position:absolute;inset:0;overflow-y:auto;padding:0 7vw;scrollbar-width:none;-webkit-overflow-scrolling:touch}.scroll::-webkit-scrollbar{display:none}.copy{white-space:pre-wrap;text-align:center;font-weight:760;line-height:1.34;letter-spacing:-.025em}.spacer{height:43dvh}.mirrored{transform:scaleX(-1)}.focus{position:absolute;z-index:2;top:47%;left:5vw;right:5vw;height:2px;pointer-events:none;background:linear-gradient(90deg,transparent,#8b5cf699,transparent)}.reader-controls{position:fixed;z-index:5;left:12px;right:12px;bottom:max(14px,env(safe-area-inset-bottom));display:grid;grid-template-columns:1.25fr 1fr .8fr;gap:8px}.reader-controls button{border:1px solid #ffffff22;border-radius:14px;padding:13px 8px;background:#1a1a1ed9;backdrop-filter:blur(16px);color:#fff;font-size:14px;font-weight:700}.reader-controls button:first-child{background:#7c4ce9e8}.speed{position:fixed;z-index:5;top:max(10px,env(safe-area-inset-top));left:14px;right:14px;display:flex;align-items:center;gap:12px;padding:8px 13px;border-radius:14px;background:#131318cf;backdrop-filter:blur(14px);color:#d0d0d7;font-size:12px}.speed input{margin:0}
  </style>
</head>
<body>
  <main id="app"></main>
  <script>
    const starter='Я решила сразу проверить ИИ-менеджера на живом клиенте. Это была ошибка.\\n\\nЗа пять минут он четыре раза поздоровался и несколько раз спросил то, что клиент уже написал.\\n\\nПришлось написать: «Извините, я сейчас борюсь с этим роботом».\\n\\nДо Сочи два дня. Либо я его настрою, либо он настроит меня.';
    let text=localStorage.getItem('alina-prompter-text')||starter,size=42,speed=28,mirror=false,running=false,raf=0,last=0;
    const app=document.getElementById('app');
    function setup(){cancelAnimationFrame(raf);running=false;app.className='setup';app.innerHTML=`<div class="panel"><div class="eyebrow">СУФЛЁР АЛИНЫ</div><h1>Вставь текст — и снимай</h1><p class="hint">Текст сохранится на этом iPhone. Первый ролик уже вставлен.</p><textarea aria-label="Текст">${text.replaceAll('&','&amp;').replaceAll('<','&lt;')}</textarea><div class="controls"><label>Размер <b id="sv">${size}</b><input id="size" type="range" min="28" max="72" value="${size}"></label><label>Скорость <b id="pv">${speed}</b><input id="speed" type="range" min="8" max="80" value="${speed}"></label></div><label class="switch"><input id="mirror" type="checkbox" ${mirror?'checked':''}><span>Зеркальный текст</span></label><button class="primary" id="start">Начать читать</button></div>`;
      const ta=app.querySelector('textarea');ta.oninput=e=>{text=e.target.value;localStorage.setItem('alina-prompter-text',text)};
      app.querySelector('#size').oninput=e=>{size=+e.target.value;app.querySelector('#sv').textContent=size};
      app.querySelector('#speed').oninput=e=>{speed=+e.target.value;app.querySelector('#pv').textContent=speed};
      app.querySelector('#mirror').onchange=e=>mirror=e.target.checked;app.querySelector('#start').onclick=reader;
    }
    function toggle(){running=!running;document.querySelector('#pause').textContent=running?'Пауза':'Продолжить';if(running){last=performance.now();raf=requestAnimationFrame(tick)}else cancelAnimationFrame(raf)}
    function tick(now){if(!running)return;const sc=document.querySelector('.scroll');sc.scrollTop+=(now-last)/1000*speed;last=now;if(sc.scrollTop+sc.clientHeight>=sc.scrollHeight-2){running=false;document.querySelector('#pause').textContent='Продолжить';return}raf=requestAnimationFrame(tick)}
    function reader(){app.className='reader';app.innerHTML=`<div class="focus"></div><div class="scroll ${mirror?'mirrored':''}" style="font-size:${size}px"><div class="spacer"></div><div class="copy"></div><div class="spacer"></div></div><div class="reader-controls"><button id="pause">Пауза</button><button id="reset">Сначала</button><button id="edit">Текст</button></div><div class="speed"><span>Скорость</span><input id="liveSpeed" type="range" min="8" max="80" value="${speed}"></div>`;app.querySelector('.copy').textContent=text;app.querySelector('.scroll').onclick=toggle;app.querySelector('#pause').onclick=toggle;app.querySelector('#reset').onclick=()=>app.querySelector('.scroll').scrollTop=0;app.querySelector('#edit').onclick=setup;app.querySelector('#liveSpeed').oninput=e=>speed=+e.target.value;running=true;last=performance.now();setTimeout(()=>raf=requestAnimationFrame(tick),700)}
    setup();
  </script>
</body>
</html>
