<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta name="theme-color" content="#050507">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Суфлёр Алины</title>
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#060608;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",Arial,sans-serif}button,textarea,input{font:inherit}.hidden{display:none!important}
    .setup{height:100dvh;overflow:auto;padding:max(18px,env(safe-area-inset-top)) 16px max(24px,env(safe-area-inset-bottom));background:radial-gradient(circle at 82% 0,#362365 0,transparent 34%),#09090c}.panel{width:min(680px,100%);margin:auto}.eyebrow{color:#bea8ff;font-size:12px;font-weight:850;letter-spacing:.16em}.panel h1{margin:9px 0 6px;font-size:clamp(30px,8vw,50px);line-height:1.02;letter-spacing:-.045em}.hint{color:#aaaab3;font-size:14px;line-height:1.4;margin:0 0 14px}.textInput{width:100%;height:37dvh;min-height:235px;resize:vertical;border:1px solid #30303a;border-radius:18px;padding:16px;background:#15151b;color:#fff;font-size:17px;line-height:1.5;outline:0}.textInput:focus{border-color:#8b5cf6;box-shadow:0 0 0 3px #8b5cf633}.controls{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:12px 0}.control{border:1px solid #292932;border-radius:14px;padding:10px 12px;background:#111116;color:#b8b8c0;font-size:13px}.control b{float:right;color:#fff}input[type=range]{width:100%;margin-top:9px;accent-color:#8b5cf6}.switch{display:flex;align-items:center;gap:10px;color:#dddde2;font-size:14px;margin:10px 0}.switch input{width:20px;height:20px;accent-color:#8b5cf6}.primary{width:100%;border:0;border-radius:17px;padding:16px;background:linear-gradient(135deg,#9b70ff,#7047df);color:#fff;font-size:17px;font-weight:800;box-shadow:0 12px 35px #7c3aed44}.permission{margin-top:10px;color:#92929c;font-size:12px;text-align:center}.sceneCard{margin:12px 0;padding:13px;border:1px solid #2d2d36;border-radius:18px;background:#121217}.sceneHead{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}.sceneTitle{font-size:15px;font-weight:800}.deleteScene{border:0;background:#2b2025;color:#ff9aa5;border-radius:10px;padding:7px 10px;font-size:12px}.sceneText{width:100%;min-height:120px;resize:vertical;border:1px solid #30303a;border-radius:14px;padding:14px;background:#0d0d11;color:#fff;font-size:17px;line-height:1.45;outline:0}.addScene{width:100%;margin:2px 0 12px;border:1px dashed #5d4a8f;border-radius:15px;padding:13px;background:#171320;color:#cdbdff;font-weight:750}
    .camera{position:fixed;inset:0;background:#000;overflow:hidden}video{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;transform:scaleX(-1)}.shade{position:absolute;inset:0;background:linear-gradient(#0008 0,#0000 20%,#0000 72%,#0009 100%);pointer-events:none}.guide{position:absolute;left:10px;right:10px;top:10%;height:39%;overflow:hidden;border-radius:20px;background:linear-gradient(180deg,#000000b8,#00000078 58%,#00000020);backdrop-filter:blur(3px);-webkit-mask-image:linear-gradient(transparent,#000 10%,#000 88%,transparent);mask-image:linear-gradient(transparent,#000 10%,#000 88%,transparent)}.script{padding:15vh 5vw 18vh;white-space:pre-wrap;text-align:center;font-size:38px;font-weight:790;line-height:1.38;letter-spacing:-.02em;transition:transform .52s cubic-bezier(.22,.8,.3,1);will-change:transform}.word{color:#fffffff0;transition:color .25s,text-shadow .25s}.word.done{color:#ffffff25}.word.current{color:#e0d4ff;text-shadow:0 0 16px #7c3aed,0 2px 5px #000}.word.current~.word{color:#ffffffe0}.focusLine{position:absolute;z-index:2;top:51%;left:5%;right:5%;height:2px;background:linear-gradient(90deg,transparent,#a982ff,transparent);pointer-events:none}.topbar{position:absolute;z-index:5;top:max(12px,env(safe-area-inset-top));left:12px;right:12px;display:flex;justify-content:space-between;align-items:center}.pill{border:1px solid #ffffff26;border-radius:999px;padding:9px 13px;background:#111116b8;backdrop-filter:blur(14px);color:#fff;font-size:13px;font-weight:750}.status{display:flex;align-items:center;gap:7px}.dot{width:8px;height:8px;border-radius:50%;background:#787882}.listening .dot{background:#58e28a;box-shadow:0 0 12px #58e28a}.recording .dot{background:#ff3b4d;box-shadow:0 0 12px #ff3b4d}.bottom{position:absolute;z-index:6;left:14px;right:14px;bottom:max(16px,env(safe-area-inset-bottom));display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:18px}.sideBtn{justify-self:center;border:0;background:#17171dcc;color:#fff;border-radius:15px;padding:12px 13px;font-size:13px;font-weight:750;backdrop-filter:blur(14px)}.record{width:72px;height:72px;border:5px solid #fff;border-radius:50%;background:#ff3347;box-shadow:0 4px 26px #0009}.record.on{border-radius:24px;transform:scale(.88)}.voiceBar{position:absolute;z-index:5;left:16px;right:16px;bottom:calc(max(16px,env(safe-area-inset-bottom)) + 88px);display:flex;gap:9px;align-items:center;padding:9px 12px;border-radius:14px;background:#111116bc;backdrop-filter:blur(14px);font-size:12px;color:#c8c8ce}.voiceBar input{margin:0}.zoomBar{position:absolute;z-index:6;left:50%;bottom:calc(max(16px,env(safe-area-inset-bottom)) + 139px);transform:translateX(-50%);display:flex;align-items:center;gap:6px;padding:6px;border-radius:999px;background:#111116cf;backdrop-filter:blur(14px)}.zoomBar button{min-width:43px;height:35px;border:0;border-radius:999px;background:#282831;color:#fff;font-size:14px;font-weight:800}.zoomBar .zoomNow{background:#f3d04b;color:#080808}.camera.landscape .guide{top:12%;left:12%;right:12%;height:36%}.toast{position:absolute;z-index:10;top:28%;left:50%;transform:translateX(-50%);width:min(88%,390px);padding:14px;border-radius:16px;background:#17171ee8;text-align:center;font-size:14px;line-height:1.4;box-shadow:0 10px 40px #000}.result{position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:14px;padding:24px;background:#08080c}.result h2{margin:0;font-size:30px}.result p{margin:0 0 4px;color:#aaaab2;text-align:center;line-height:1.4}.result a,.result button{width:min(360px,100%);border:0;border-radius:16px;padding:16px;text-align:center;text-decoration:none;font-weight:800}.save{background:#8b5cf6;color:#fff}.again{background:#202027;color:#fff}
  </style>
</head>
<body>
  <main id="app" class="setup"></main>
  <section id="result" class="result hidden"><h2>Видео готово</h2><p>Нажми «Сохранить видео», затем выбери «Сохранить видео» или «Сохранить в Файлы».</p><a id="save" class="save">Сохранить видео</a><button id="again" class="again">Снять ещё раз</button></section>
  <script>
    const defaultScenes=[
      'Я решила сразу проверить ИИ-менеджера на живом клиенте. Это была ошибка.',
      'За пять минут он четыре раза поздоровался и несколько раз спросил то, что клиент уже написал.',
      'Пришлось написать: «Извините, я сейчас борюсь с этим роботом».',
      'До Сочи два дня. Либо я его настрою, либо он настроит меня.'
    ];
    function loadScenes(){
      try{const saved=JSON.parse(localStorage.getItem('alina-prompter-scenes'));if(Array.isArray(saved)&&saved.length)return saved}catch(e){}
      const old=localStorage.getItem('alina-prompter-text');
      if(old){const fixed=old.replace(/\\n\\n/g,'\n\n'),parts=fixed.split(/\n\s*\n/).map(s=>s.trim()).filter(Boolean);if(parts.length>1)return parts}
      return [...defaultScenes];
    }
    const app=document.querySelector('#app'),result=document.querySelector('#result');
    let scenes=loadScenes(),activeScene=0,text=scenes[0]||'',size=38,sensitivity=55,voiceMode=true,stream,recorder,chunks=[],recognition,currentWord=0,recording=false,listening=false,manualOffset=0,lastHeard='',speechDebounce=0,orientation='portrait',zoomLevel=1,videoTrack=null,recordTimer=0,recordStartedAt=0,audioContext=null,audioAnalyser=null,audioFrame=0,lastVoiceStep=0;
    const clean=s=>(s||'').toLowerCase().replace(/ё/g,'е').replace(/[^\p{L}\p{N}\s]/gu,' ').replace(/\s+/g,' ').trim();
    const words=()=>text.match(/\S+/g)||[];
    function esc(s){return s.replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')}
    function saveScenes(){localStorage.setItem('alina-prompter-scenes',JSON.stringify(scenes))}
    function setup(){
      stopEverything();result.classList.add('hidden');app.className='setup';
      const cards=scenes.map((scene,i)=>`<div class="sceneCard"><div class="sceneHead"><span class="sceneTitle">Кадр ${i+1}</span>${scenes.length>1?'<button class="deleteScene" data-delete="'+i+'">Удалить</button>':''}</div><textarea class="sceneText" data-scene="${i}" aria-label="Текст кадра ${i+1}">${esc(scene)}</textarea></div>`).join('');
      app.innerHTML=`<div class="panel"><div class="eyebrow">СУФЛЁР АЛИНЫ</div><h1>Текст по кадрам</h1><p class="hint">Каждый фрагмент — отдельный кадр. В камере переключай их стрелками.</p><div id="scenes">${cards}</div><button class="addScene" id="addScene">＋ Добавить кадр</button><div class="controls"><label class="control">Размер <b id="sv">${size}</b><input id="size" type="range" min="26" max="58" value="${size}"></label><label class="control">Чувствительность <b id="cv">${sensitivity}</b><input id="sense" type="range" min="25" max="90" value="${sensitivity}"></label></div><label class="switch"><input id="voice" type="checkbox" ${voiceMode?'checked':''}><span>Двигать текст за моим голосом</span></label><button class="primary" id="open">Открыть камеру с кадра 1</button><div class="permission">При первом запуске разреши доступ к камере и микрофону.</div></div>`;
      app.querySelectorAll('[data-scene]').forEach(ta=>ta.oninput=e=>{const i=+e.target.dataset.scene;scenes[i]=e.target.value;saveScenes()});
      app.querySelectorAll('[data-delete]').forEach(btn=>btn.onclick=e=>{scenes.splice(+e.currentTarget.dataset.delete,1);saveScenes();setup()});
      app.querySelector('#addScene').onclick=()=>{scenes.push('');saveScenes();setup();setTimeout(()=>{const all=app.querySelectorAll('.sceneText');all[all.length-1]?.focus();all[all.length-1]?.scrollIntoView({behavior:'smooth',block:'center'})},50)};
      app.querySelector('#size').oninput=e=>{size=+e.target.value;app.querySelector('#sv').textContent=size};
      app.querySelector('#sense').oninput=e=>{sensitivity=+e.target.value;app.querySelector('#cv').textContent=sensitivity};
      app.querySelector('#voice').onchange=e=>voiceMode=e.target.checked;
      app.querySelector('#open').onclick=()=>{activeScene=0;text=scenes[0]||'';openCamera()};
    }
    function videoConstraints(){
      return orientation==='portrait'
        ?{facingMode:{exact:'user'},width:{ideal:1080},height:{ideal:1920},aspectRatio:{ideal:9/16},resizeMode:'none'}
        :{facingMode:{exact:'user'},width:{ideal:1920},height:{ideal:1080},aspectRatio:{ideal:16/9},resizeMode:'none'};
    }
    async function getCameraStream(){
      stream=await navigator.mediaDevices.getUserMedia({video:videoConstraints(),audio:{echoCancellation:true,noiseSuppression:true}});
      videoTrack=stream.getVideoTracks()[0];const caps=videoTrack.getCapabilities?.()||{};
      zoomLevel=caps.zoom?Math.max(caps.zoom.min||1,Math.min(zoomLevel,caps.zoom.max||zoomLevel)):1;
      if(caps.zoom){try{await videoTrack.applyConstraints({advanced:[{zoom:zoomLevel}]})}catch(_){}}
    }
    async function openCamera(){
      try{await getCameraStream();cameraUI()}
      catch(e){alert('Не получилось открыть камеру. В настройках Safari разреши камеру и микрофон для этого сайта.')}
    }
    function cameraUI(){
      currentWord=0;manualOffset=0;lastHeard='';app.className='camera '+orientation;
      app.innerHTML=`<video autoplay playsinline muted></video><div class="shade"></div><div class="guide"><div class="script" style="font-size:${size}px"></div><div class="focusLine"></div></div><div class="topbar"><button id="back" class="pill">← Текст</button><button id="orientation" class="pill">${orientation==='portrait'?'↕ Вертикально':'↔ Горизонтально'}</button><div id="status" class="pill status"><i class="dot"></i><span>Готов</span></div></div><div class="zoomBar"><button id="zoomOut">−</button><button id="zoomReset" class="zoomNow">${zoomLevel.toFixed(1)}×</button><button id="zoomIn">+</button><button id="sceneCount">Кадр ${activeScene+1}/${scenes.length}</button></div><div class="voiceBar"><span>Положение</span><input id="position" type="range" min="0" max="100" value="0"></div><div class="bottom"><button id="prevScene" class="sideBtn">← Кадр</button><button id="record" class="record" aria-label="Запись"></button><button id="nextScene" class="sideBtn">Кадр →</button></div><div id="toast" class="toast">Нажми красную кнопку. После начала записи говори естественно — текст будет следовать за тобой.</div>`;
      app.querySelector('video').srcObject=stream;renderWords();setTimeout(()=>app.querySelector('#toast')?.remove(),4200);
      app.querySelector('#back').onclick=setup;app.querySelector('#record').onclick=toggleRecord;app.querySelector('#orientation').onclick=switchOrientation;app.querySelector('#zoomOut').onclick=()=>changeZoom(-.1);app.querySelector('#zoomIn').onclick=()=>changeZoom(.1);app.querySelector('#zoomReset').onclick=()=>setZoom(1);
      app.querySelector('#prevScene').onclick=()=>switchScene(-1);
      app.querySelector('#nextScene').onclick=()=>switchScene(1);
      app.querySelector('#position').oninput=e=>{manualOffset=+e.target.value;scrollToWord()};
    }
    async function setZoom(value){
      const caps=videoTrack?.getCapabilities?.()||{};
      if(!caps.zoom){showToast('Фронтальная камера Safari не даёт менять аппаратный зум на этом iPhone.');return}
      zoomLevel=Math.max(caps.zoom.min||1,Math.min(value,caps.zoom.max||value));
      try{await videoTrack.applyConstraints({advanced:[{zoom:zoomLevel}]});const z=app.querySelector('#zoomReset');if(z)z.textContent=zoomLevel.toFixed(1)+'×'}catch(e){showToast('Этот масштаб камера не поддерживает.')}
    }
    function changeZoom(delta){setZoom(Math.round((zoomLevel+delta)*10)/10)}
    async function switchOrientation(){
      if(recording){showToast('Сначала останови запись.');return}
      orientation=orientation==='portrait'?'landscape':'portrait';
      stream?.getTracks().forEach(t=>t.stop());
      try{await getCameraStream();const v=app.querySelector('video');v.srcObject=stream;app.className='camera '+orientation;app.querySelector('#orientation').textContent=orientation==='portrait'?'↕ Вертикально':'↔ Горизонтально';const z=app.querySelector('#zoomReset');if(z)z.textContent=zoomLevel.toFixed(1)+'×';showToast(orientation==='portrait'?'Вертикальный кадр':'Горизонтальный кадр — поверни iPhone боком')}catch(e){showToast('Не получилось переключить формат камеры.')}
    }
    function switchScene(delta){
      const next=Math.max(0,Math.min(activeScene+delta,scenes.length-1));
      if(next===activeScene){showToast(delta>0?'Это последний кадр':'Это первый кадр');return}
      activeScene=next;text=scenes[activeScene]||'';currentWord=0;lastHeard='';manualOffset=0;
      const count=app.querySelector('#sceneCount');if(count)count.textContent='Кадр '+(activeScene+1)+'/'+scenes.length;
      const pos=app.querySelector('#position');if(pos)pos.value=0;renderWords();
    }
    function renderWords(){
      const list=words(),box=app.querySelector('.script');if(!box)return;
      box.innerHTML=list.map((w,i)=>`<span class="word ${i<currentWord?'done':''} ${i===currentWord?'current':''}" data-i="${i}">${esc(w)} </span>`).join('');
      scrollToWord();
    }
    function scrollToWord(){
      const guide=app.querySelector('.guide'),box=app.querySelector('.script'),active=app.querySelector(`[data-i="${currentWord}"]`);if(!guide||!box||!active)return;
      const target=Math.max(0,active.offsetTop-guide.clientHeight*.43+manualOffset*2.2);box.style.transform=`translateY(${-target}px)`;
    }
    function updateStatus(mode,label){const s=app.querySelector('#status');if(!s)return;s.className='pill status '+mode;s.querySelector('span').textContent=label}
    function wordScore(a,b){
      if(!a||!b)return 0;if(a===b)return 2;
      if(a.length>=4&&b.length>=4&&(a.startsWith(b)||b.startsWith(a)))return 1.35;
      return 0;
    }
    function bestMatch(transcript){
      const heard=clean(transcript);if(!heard||heard===lastHeard)return;lastHeard=heard;
      const spoken=heard.split(' ').filter(Boolean).slice(-12),list=words().map(clean);
      const from=Math.max(0,currentWord-5),to=Math.min(list.length,currentWord+55);
      let bestEnd=currentWord,bestScore=0,bestHits=0;
      for(let start=from;start<to;start++){
        for(let offset=0;offset<spoken.length;offset++){
          let score=0,hits=0,streak=0;
          for(let j=offset;j<spoken.length&&start+j-offset<list.length;j++){
            const s=wordScore(spoken[j],list[start+j-offset]);
            if(s){hits++;streak++;score+=s+Math.min(streak,4)*.18}else{streak=0;score-=.35}
          }
          score-=Math.max(0,start-currentWord-14)*.08;
          if(score>bestScore){bestScore=score;bestHits=hits;bestEnd=start+spoken.length-offset}
        }
      }
      const needed=spoken.length===1?1.8:spoken.length<4?2.5:3.2;
      if(bestScore>=needed&&bestHits>=1){
        const next=Math.min(bestEnd,list.length-1,currentWord+10);
        if(next>currentWord){currentWord=next;renderWords()}
      }
    }
    function startAudioFollow(){
      stopAudioFollow();const AudioCtx=window.AudioContext||window.webkitAudioContext;if(!AudioCtx||!stream?.getAudioTracks().length)return;
      try{
        audioContext=new AudioCtx();const source=audioContext.createMediaStreamSource(stream);audioAnalyser=audioContext.createAnalyser();audioAnalyser.fftSize=512;audioAnalyser.smoothingTimeConstant=.72;source.connect(audioAnalyser);
        const data=new Uint8Array(audioAnalyser.fftSize);
        const listen=now=>{
          if(!recording||!audioAnalyser)return;audioAnalyser.getByteTimeDomainData(data);
          let sum=0;for(let i=0;i<data.length;i++){const v=(data[i]-128)/128;sum+=v*v}
          const level=Math.sqrt(sum/data.length),threshold=.018+(90-sensitivity)*.00022;
          if(level>threshold&&now-lastVoiceStep>390){
            lastVoiceStep=now;
            if(currentWord<words().length-1){currentWord++;renderWords()}
            updateStatus('recording','Запись • '+formatTime(Date.now()-recordStartedAt));
          }
          audioFrame=requestAnimationFrame(listen);
        };audioFrame=requestAnimationFrame(listen);
      }catch(e){}
    }
    function stopAudioFollow(){if(audioFrame)cancelAnimationFrame(audioFrame);audioFrame=0;audioAnalyser=null;if(audioContext){try{audioContext.close()}catch(e){}audioContext=null}}
    function formatTime(ms){const total=Math.floor(ms/1000),m=String(Math.floor(total/60)).padStart(2,'0'),s=String(total%60).padStart(2,'0');return m+':'+s}
    function startRecordTimer(){clearInterval(recordTimer);recordStartedAt=Date.now();updateStatus('recording','Запись • 00:00');recordTimer=setInterval(()=>updateStatus('recording','Запись • '+formatTime(Date.now()-recordStartedAt)),250)}
    function stopRecordTimer(){clearInterval(recordTimer);recordTimer=0}
    function startSpeech(){
      const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){showToast('На этом iPhone слежение за голосом недоступно. Текст можно двигать ползунком.');return}
      stopSpeech();recognition=new SR();recognition.lang='ru-RU';recognition.continuous=true;recognition.interimResults=true;
      recognition.onstart=()=>{listening=true;updateStatus(recording?'recording':'listening',recording?'Запись • слушаю':'Слушаю')};
      recognition.onresult=e=>{let phrase='';for(let i=Math.max(0,e.resultIndex-1);i<e.results.length;i++)phrase+=' '+e.results[i][0].transcript;clearTimeout(speechDebounce);speechDebounce=setTimeout(()=>bestMatch(phrase),140)};
      recognition.onerror=()=>{};recognition.onend=()=>{listening=false;if(recording&&voiceMode)setTimeout(startSpeech,450)};
      try{recognition.start()}catch(e){}
    }
    function stopSpeech(){if(recognition){recognition.onend=null;try{recognition.stop()}catch(e){}recognition=null}listening=false}
    function supportedMime(){const types=['video/mp4;codecs=h264,aac','video/mp4','video/webm;codecs=vp9,opus','video/webm'];return types.find(t=>window.MediaRecorder&&MediaRecorder.isTypeSupported(t))||''}
    function toggleRecord(){recording?stopRecord():startRecord()}
    function startRecord(){
      if(!window.MediaRecorder){showToast('Эта версия Safari не умеет сохранять запись. Обнови iOS или открой ссылку в Safari.');return}
      chunks=[];const mime=supportedMime();try{recorder=new MediaRecorder(stream,mime?{mimeType:mime}:undefined)}catch(e){recorder=new MediaRecorder(stream)}
      recorder.ondataavailable=e=>{if(e.data.size)chunks.push(e.data)};recorder.onstop=finishVideo;recorder.start(1000);recording=true;
      app.querySelector('#record').classList.add('on');startRecordTimer();startAudioFollow();if(voiceMode)startSpeech();
    }
    function stopRecord(){recording=false;stopSpeech();stopAudioFollow();stopRecordTimer();if(recorder&&recorder.state!=='inactive')recorder.stop();app.querySelector('#record')?.classList.remove('on');updateStatus('','Готов')}
    function finishVideo(){
      const type=recorder?.mimeType||'video/mp4',blob=new Blob(chunks,{type}),url=URL.createObjectURL(blob),ext=type.includes('mp4')?'mp4':'webm';
      document.querySelector('#save').href=url;document.querySelector('#save').download=`video-aliny-${new Date().toISOString().slice(0,10)}.${ext}`;result.classList.remove('hidden');
    }
    function showToast(message){let t=app.querySelector('#toast');if(!t){t=document.createElement('div');t.id='toast';t.className='toast';app.appendChild(t)}t.textContent=message;setTimeout(()=>t.remove(),5000)}
    function stopEverything(){recording=false;stopSpeech();stopAudioFollow();stopRecordTimer();if(recorder&&recorder.state!=='inactive')try{recorder.stop()}catch(e){}if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;videoTrack=null}}
    document.querySelector('#again').onclick=()=>{result.classList.add('hidden');setup()};window.addEventListener('beforeunload',stopEverything);setup();
  </script>
</body>
</html>
